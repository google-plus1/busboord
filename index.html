<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arriva Boordcomputer – Roblox Connect</title>
    <style>
        /* exact dezelfde stijl als je laatste werkende versie, overgenomen */
        :root {
            --bg-cream: #E8E8D8;
            --bg-light: #F0F0E0;
            --green-pale: #C8D8B8;
            --green-mid: #8FB87A;
            --green-dark: #4A7A3A;
            --red-alert: #D32F2F;
            --orange-warn: #F57C00;
            --text-dark: #2C2C2C;
            --text-muted: #666;
            --sidebar-bg: #D8D8C8;
            --sidebar-btn: #C0C0B0;
            --sidebar-btn-active: #8FB87A;
            --sidebar-btn-hover: #B0B0A0;
            --border-color: #B8B8A8;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { display:flex; justify-content:center; align-items:center; height:100vh; width:100vw; overflow:hidden; background:#1a1a1a; font-family:'Segoe UI','Roboto','Inter','Open Sans',sans-serif; }
        .tablet-frame { width:100vw; height:100vh; max-width:1200px; max-height:800px; background:var(--bg-cream); display:flex; flex-direction:column; overflow:hidden; position:relative; border-radius:8px; }
        .page { display:none; flex-direction:column; height:100%; width:100%; }
        .page.active { display:flex; }

        .top-bar { background:var(--bg-light); border-bottom:2px solid var(--border-color); padding:6px 16px; display:flex; align-items:center; justify-content:space-between; height:40px; flex-shrink:0; }
        .top-bar-left { display:flex; align-items:center; gap:12px; font-size:12px; font-weight:500; color:var(--text-muted); }
        .top-bar-left span { color:var(--text-dark); font-weight:600; }
        .top-bar-right { display:flex; align-items:center; gap:10px; }
        .status-dot { width:10px; height:10px; border-radius:50%; }
        .status-dot.green { background:#4CAF50; box-shadow:0 0 6px rgba(76,175,80,0.5); }

        .main-layout { display:flex; flex:1; overflow:hidden; }
        .center-area { flex:1; display:flex; flex-direction:column; padding:12px 16px; gap:10px; overflow:hidden; }
        .right-sidebar { width:150px; background:var(--sidebar-bg); border-left:2px solid var(--border-color); display:flex; flex-direction:column; padding:8px 6px; gap:6px; flex-shrink:0; overflow-y:auto; }
        .sidebar-btn { width:100%; padding:10px 6px; border-radius:6px; border:1px solid var(--border-color); background:var(--sidebar-btn); color:var(--text-dark); font-size:11px; font-weight:600; cursor:pointer; transition:all 0.15s; text-align:center; }
        .sidebar-btn:hover { background:var(--sidebar-btn-hover); transform:translateY(-1px); }
        .sidebar-btn.active { background:var(--sidebar-btn-active); color:white; border-color:var(--green-dark); }

        .header-info { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
        .header-left { flex:1; }
        .line-number { font-size:26px; font-weight:900; color:var(--text-dark); line-height:1.1; }
        .line-status { font-size:13px; color:var(--text-muted); margin-top:2px; }
        .destination { font-size:17px; font-weight:600; color:var(--text-dark); margin-top:3px; }
        .delay-box { width:85px; height:65px; background:var(--green-dark); border-radius:8px; display:flex; align-items:center; justify-content:center; color:white; font-size:20px; font-weight:900; flex-shrink:0; box-shadow:0 4px 20px rgba(0,0,0,0.15); transition:all 0.3s; font-family:'Courier New',monospace; }
        .delay-box.red { background:var(--red-alert); }
        .delay-box.yellow { background:var(--orange-warn); }

        .stop-list { flex:1; overflow-y:auto; border-radius:8px; border:1px solid var(--border-color); background:var(--green-pale); padding:8px; display:flex; flex-direction:column; gap:3px; }
        .stop-item { display:flex; align-items:center; padding:7px 12px; border-radius:6px; font-size:13px; font-weight:500; transition:all 0.15s; border-left:4px solid transparent; color:var(--text-dark); }
        .stop-item:hover { background:rgba(255,255,255,0.4); }
        .stop-item.current { background:rgba(255,255,255,0.75); border-left-color:var(--orange-warn); font-weight:700; }
        .stop-item.past { opacity:0.45; text-decoration:line-through; }
        .stop-item.start { border-left-color:var(--green-dark); background:rgba(74,122,58,0.12); }
        .stop-item.end { border-left-color:var(--red-alert); background:rgba(211,47,47,0.08); }
        .stop-name { flex:1; }
        .stop-time { font-variant-numeric:tabular-nums; font-weight:600; color:var(--text-muted); margin-right:8px; }

        .bottom-bar { background:var(--bg-light); border-top:2px solid var(--border-color); padding:8px 16px; display:flex; align-items:center; justify-content:space-between; height:52px; flex-shrink:0; }
        .bottom-left { display:flex; gap:8px; }
        .bottom-btn { padding:8px 18px; border-radius:6px; border:none; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.15s; color:white; }
        .bottom-btn:hover { transform:translateY(-1px); filter:brightness(1.1); }
        .bottom-btn:active { transform:scale(0.96); }
        .bottom-btn.green { background:var(--green-dark); }
        .bottom-btn.blue { background:#1976D2; }
        .bottom-btn.orange { background:var(--orange-warn); }
        .bottom-btn:disabled { opacity:0.4; cursor:not-allowed; }
        .bottom-right { display:flex; align-items:center; gap:14px; }
        .arrival-badge { background:var(--green-dark); color:white; padding:4px 12px; border-radius:12px; font-size:12px; font-weight:700; }
        .clock-time { font-size:20px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--text-dark); }
        .clock-date { font-size:11px; color:var(--text-muted); text-align:right; }

        .dial-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); z-index:2000; display:none; align-items:center; justify-content:center; }
        .dial-overlay.show { display:flex; }
        .dial-panel { background:var(--bg-light); border-radius:20px; padding:24px; display:flex; flex-direction:column; align-items:center; gap:16px; box-shadow:0 20px 50px rgba(0,0,0,0.4); border:2px solid var(--border-color); min-width:280px; }
        .dial-display { width:100%; padding:16px; background:var(--green-pale); border-radius:10px; text-align:center; font-size:36px; font-weight:900; letter-spacing:6px; color:var(--text-dark); border:2px solid var(--border-color); min-height:60px; }
        .dial-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:100%; }
        .dial-key { aspect-ratio:1; border-radius:14px; border:2px solid var(--border-color); background:white; font-size:26px; font-weight:700; color:var(--text-dark); cursor:pointer; transition:all 0.1s; display:flex; align-items:center; justify-content:center; }
        .dial-key:hover { background:var(--sidebar-btn-hover); transform:scale(0.94); }
        .dial-key.clear { background:var(--red-alert); color:white; border-color:var(--red-dark); font-size:18px; }
        .dial-key.ok { background:var(--green-dark); color:white; border-color:#2E5A1E; font-size:20px; }
        .dial-key.zero { grid-column:2; }

        .subpage { background:#f0f4f8; color:#333; }
        .subpage-header { background:var(--bg-light); border-bottom:2px solid var(--border-color); padding:12px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
        .subpage-header h2 { font-size:18px; font-weight:600; color:var(--text-dark); }
        .subpage-content { flex:1; overflow-y:auto; padding:16px; }
        .card { background:white; border-radius:10px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,0.08); margin-bottom:12px; border:1px solid var(--border-color); }
        .action-btn { padding:10px 20px; border-radius:8px; border:none; font-weight:700; font-size:14px; cursor:pointer; margin-top:8px; color:white; }
        .action-btn.blue { background:#3498DB; }
        .action-btn.green { background:var(--green-dark); }
        .action-btn.red { background:var(--red-alert); }
        .action-btn.orange { background:#E67E22; }
        .function-btn { width:100%; padding:12px; margin:4px 0; border-radius:8px; border:none; font-weight:700; font-size:15px; cursor:pointer; color:white; }
        .ticket-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
        .ticket-card { background:linear-gradient(135deg,var(--green-mid),var(--green-dark)); color:white; border-radius:8px; padding:12px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; border:none; }
        .ticket-card:hover { transform:translateY(-2px); }
        .ticket-card.orange { background:linear-gradient(135deg,#E67E22,#D35400); }
        .ticket-card.purple { background:linear-gradient(135deg,#9B59B6,#8E44AD); }
        .cart-item { display:flex; justify-content:space-between; padding:8px 12px; background:var(--bg-light); border-radius:6px; margin-bottom:4px; }
        .cart-total { display:flex; justify-content:space-between; padding:10px; background:var(--green-dark); color:white; border-radius:6px; font-weight:700; margin-top:8px; }
        .pay-btn { width:100%; padding:12px; background:var(--green-dark); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer; margin-top:8px; }
        .clear-btn { width:100%; padding:10px; background:var(--red-alert); color:white; border:none; border-radius:8px; cursor:pointer; margin-top:6px; }
        .toggle-switch { width:44px; height:24px; background:#ccc; border-radius:12px; position:relative; cursor:pointer; }
        .toggle-switch.active { background:var(--green-dark); }
        .toggle-switch::after { content:''; position:absolute; width:20px; height:20px; background:white; border-radius:50%; top:2px; left:2px; transition:transform 0.3s; }
        .toggle-switch.active::after { transform:translateX(20px); }
        textarea { width:100%; padding:8px; border-radius:6px; border:1px solid var(--border-color); font-family:inherit; resize:vertical; }
        .back-btn { width:32px; height:32px; border-radius:6px; border:none; background:var(--sidebar-btn); cursor:pointer; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>
<div class="tablet-frame">
    <!-- HOME PAGE -->
    <div class="page active" id="pageHome">
        <div class="top-bar">
            <div class="top-bar-left">
                <span id="topDate"></span><span style="color:var(--text-muted)">|</span>
                <span>Lijn <span id="topLineNum">54</span></span><span style="color:var(--text-muted)">|</span>
                <span>Bestuurder: <span id="topDriver">J. de Vries</span></span><span style="color:var(--text-muted)">|</span>
                <span>Omloop: <span id="topOmloop">A</span></span>
            </div>
            <div class="top-bar-right">
                <span class="status-dot green"></span>
            </div>
        </div>
        <div class="main-layout">
            <div class="center-area">
                <div class="header-info">
                    <div class="header-left">
                        <div class="line-number" id="lineNumber">54 Geen Dienst</div>
                        <div class="line-status" id="lineStatus">In dienst</div>
                        <div class="destination" id="destination">Halte Busdepot</div>
                    </div>
                    <div class="delay-box green" id="delayBox">0</div>
                </div>
                <div class="stop-list" id="stopList"></div>
            </div>
            <div class="right-sidebar">
                <button class="sidebar-btn active" onclick="openDial()">🔢 LIJN</button>
                <button class="sidebar-btn" onclick="driverInfo()">👤 Bestuurder</button>
                <button class="sidebar-btn" onclick="cycleOmloop()">🔄 Omloop</button>
                <button class="sidebar-btn" onclick="goToPage('home')">🏠 Hoofdscherm</button>
                <button class="sidebar-btn" onclick="goToPage('verkoop')">🎫 Kaartverkoop</button>
                <button class="sidebar-btn" onclick="goToPage('omroep')">📢 Oproepen</button>
                <button class="sidebar-btn" onclick="goToPage('instellingen')">⚙️ Menu</button>
            </div>
        </div>
        <div class="bottom-bar">
            <div class="bottom-left">
                <button class="bottom-btn green" id="btnVertrek" onclick="sendCommand('depart')">🚌 Vertrek</button>
                <button class="bottom-btn orange" id="btnAangekomen" onclick="sendCommand('arrived')" disabled>Aangekomen</button>
                <button class="bottom-btn blue" id="btnVolgende" onclick="sendCommand('next')" disabled>⏭ Volgende</button>
                <button class="bottom-btn blue" id="btnTerug" onclick="sendCommand('prev')" disabled>⏮ Terug</button>
            </div>
            <div class="bottom-right">
                <div class="arrival-badge" id="arrivalBadge">Vertrek: --:--</div>
                <div>
                    <div class="clock-time" id="clockTime">00:00:00</div>
                    <div class="clock-date" id="clockDate">5 juli 2026</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Verkoop, Omroep, Instellingen pagina's gelijk aan vorige versie (zonder server) -->
    <!-- ... (zie volledige code in antwoord hierboven) -->
</div>

<script>
    const SERVER = 'http://localhost:3000/api';   // vervang door jouw serveradres

    const lineMap = { '1':'54', '2':'18', '3':'27', '5':'42' };
    const busLines = {
        '54': { number:'54', destination:'Halte Busdepot',
            stops: [
                {name:'Medisch Centrum', offset:0, type:'start'},
                {name:'Tijdelijke Halte Rotonde BD', offset:2},{name:'Halte Museumplein', offset:4},{name:'Halte Malherplein', offset:6},
                {name:'Bus Station', offset:8},{name:'Halte Europaweg', offset:10},{name:'Halte Busdepot (eindpunt)', offset:12, type:'end'}
            ]},
        '18': { number:'18', destination:'Leeuwarden Airport',
            stops: [
                {name:'Centraal Station', offset:0, type:'start'},
                {name:'Halte Busdepot', offset:2},{name:'Leeuwarden Airport', offset:4},{name:'Bus Station', offset:6},
                {name:'Halte Museumplein', offset:8},{name:'Halte Malherplein', offset:10},{name:'Halte Van Houtenlaan', offset:12},
                {name:'Halte School', offset:14},{name:'Halte Busdepot', offset:16},{name:'Leeuwarden Airport (eindpunt)', offset:18, type:'end'}
            ]},
        '27': { number:'27', destination:'Halte Busdepot',
            stops: [
                {name:'Halte Wijk Station', offset:0, type:'start'},
                {name:'Halte Europaweg', offset:2},{name:'Bus Station', offset:4},{name:'Medisch Centrum', offset:6},
                {name:'Halte Malherplein', offset:8},{name:'Halte Museumplein', offset:10},{name:'Halte Veldstraat', offset:12},
                {name:'Halte School', offset:14},{name:'Halte Busdepot (eindpunt)', offset:16, type:'end'}
            ]},
        '42': { number:'42', destination:'Halte Busdepot',
            stops: [
                {name:'Halte Veldstraat', offset:0, type:'start'},
                {name:'Halte Van Houtenlaan', offset:2},{name:'Medisch Centrum', offset:4},{name:'Tijdelijke Halte Rotonde BD', offset:6},
                {name:'Bus Station', offset:8},{name:'Centraal Station', offset:10},{name:'Halte Europaweg', offset:12},
                {name:'Tijdelijke Halte Rotonde BD', offset:14},{name:'Medisch Centrum', offset:16},{name:'Halte Van Houtenlaan', offset:18},
                {name:'Halte School', offset:20},{name:'Halte Busdepot', offset:22},{name:'Halte Busdepot (eindpunt)', offset:24, type:'end'}
            ]}
    };

    let currentLine = '54';
    let currentStops = busLines['54'].stops;
    let plannedStart = null;
    let actualStart = null;
    let currentStopIndex = -1;
    let arrived = false;

    // Haal de status elke seconde op van de server
    async function fetchState() {
        try {
            const res = await fetch(`${SERVER}/state`);
            const state = await res.json();
            if (state.line && busLines[state.line]) {
                if (state.line !== currentLine) {
                    currentLine = state.line;
                    currentStops = busLines[state.line].stops;
                    updateLineDisplay();
                }
                currentStopIndex = state.stopIndex;
                plannedStart = state.plannedStart ? new Date(state.plannedStart) : null;
                actualStart = state.actualStart ? new Date(state.actualStart) : null;
                arrived = state.arrived;
                if (state.stops && state.stops.length > 0) {
                    // Update offsets indien nodig (van Roblox)
                    currentStops = state.stops;
                }
                updateAll();
            }
        } catch (e) {
            console.warn('Kan server niet bereiken:', e);
        }
    }

    function updateLineDisplay() {
        document.getElementById('lineNumber').textContent = busLines[currentLine].number + ' Geen Dienst';
        document.getElementById('destination').textContent = busLines[currentLine].destination;
        document.getElementById('topLineNum').textContent = busLines[currentLine].number;
    }

    function updateAll() {
        updateDelayBox();
        updateArrivalBadge();
        renderStops();
        updateButtons();
    }

    function updateDelayBox() {
        const box = document.getElementById('delayBox');
        if (!actualStart || currentStopIndex < 0 || currentStopIndex >= currentStops.length - 1) {
            box.textContent = '0';
            box.className = 'delay-box green';
            return;
        }
        const now = new Date();
        const nextStopTime = new Date(actualStart.getTime() + currentStops[currentStopIndex + 1].offset * 60000);
        const diffSec = Math.round((now - nextStopTime) / 1000);

        function formatDelay(sec) {
            if (sec <= -60) {
                let abs = Math.abs(sec);
                let mins = Math.floor(abs / 60);
                let half = (abs % 60) >= 30 ? 0.5 : 0;
                let val = mins + half;
                let text = '-' + (val % 1 === 0 ? val : Math.floor(val) + '½');
                return { text, color: 'red' };
            } else if (sec <= -30) {
                return { text: '-½', color: 'yellow' };
            } else if (sec < 60) {
                return { text: '0', color: 'green' };
            } else {
                let mins = Math.floor(sec / 60);
                let half = (sec % 60) >= 30 ? 0.5 : 0;
                let val = mins + half;
                let text = '+' + (val % 1 === 0 ? val : Math.floor(val) + '½');
                return { text, color: 'red' };
            }
        }

        const { text, color } = formatDelay(diffSec);
        box.textContent = text;
        box.className = `delay-box ${color}`;
    }

    function updateArrivalBadge() {
        const badge = document.getElementById('arrivalBadge');
        if (currentStopIndex === -1 && plannedStart && !actualStart) {
            badge.textContent = `Vertrek: ${formatTime(plannedStart)}`;
        } else if (currentStopIndex >= 0 && currentStopIndex < currentStops.length - 1 && actualStart) {
            const next = new Date(actualStart.getTime() + currentStops[currentStopIndex + 1].offset * 60000);
            badge.textContent = `Aankomst: ${formatTime(next)}`;
        } else if (currentStopIndex >= currentStops.length - 1) {
            badge.textContent = 'Eindbestemming';
        } else {
            badge.textContent = 'Vertrek: --:--';
        }
    }

    function renderStops() {
        const list = document.getElementById('stopList'); list.innerHTML = '';
        const ref = actualStart || plannedStart || null;
        currentStops.forEach((s, i) => {
            const div = document.createElement('div'); div.className = 'stop-item';
            if (i === currentStopIndex) div.classList.add('current');
            if (i < currentStopIndex) div.classList.add('past');
            if (s.type === 'start') div.classList.add('start');
            if (s.type === 'end') div.classList.add('end');
            const t = ref ? new Date(ref.getTime() + s.offset * 60000) : null;
            div.innerHTML = `<span class="stop-name">${s.name}</span><span class="stop-time">${t ? formatTime(t) : '--:--'}</span>`;
            list.appendChild(div);
        });
        if (currentStopIndex >= 0) {
            const items = list.querySelectorAll('.stop-item');
            if (items[currentStopIndex]) items[currentStopIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function updateButtons() {
        document.getElementById('btnVertrek').disabled = !!actualStart;
        document.getElementById('btnAangekomen').disabled = !actualStart || currentStopIndex < 0;
        document.getElementById('btnVolgende').disabled = !actualStart || currentStopIndex >= currentStops.length - 1;
        document.getElementById('btnTerug').disabled = !actualStart || currentStopIndex <= 0;
    }

    async function sendCommand(cmd) {
        try {
            await fetch(`${SERVER}/command`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: cmd })
            });
        } catch (e) {
            alert('Server niet bereikbaar');
        }
    }

    function formatTime(d) { return d ? `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` : '--:--'; }

    function updateClock() {
        const n = new Date();
        document.getElementById('clockTime').textContent = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
        document.getElementById('clockDate').textContent = `${n.getDate()} ${['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'][n.getMonth()]} ${n.getFullYear()}`;
        document.getElementById('topDate').textContent = document.getElementById('clockDate').textContent;
    }

    // Lijnkiezer en andere hulpfuncties (gelijk aan vorige versie)
    let dialValue = '';
    window.openDial = function() { dialValue=''; document.getElementById('dialDisplay').textContent=''; document.getElementById('dialOverlay').classList.add('show'); };
    window.dialDigit = function(d) { if(dialValue.length<2) dialValue+=d; document.getElementById('dialDisplay').textContent=dialValue; };
    window.dialClear = function() { dialValue=''; document.getElementById('dialDisplay').textContent=''; };
    window.dialConfirm = function() {
        const digit = dialValue.trim() || '1';
        const lk = lineMap[digit] || '54';
        // Stuur lijnwissel naar server
        fetch(`${SERVER}/state`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ line: lk, stopIndex: 0, plannedStart: null, actualStart: null, arrived: false, stops: busLines[lk].stops })
        });
        document.getElementById('dialOverlay').classList.remove('show');
    };

    // Overige functies (bestuurder, omloop, etc.) blijven ongewijzigd (zie eerdere code)

    setInterval(() => { updateClock(); fetchState(); }, 1000);
    updateClock();
    fetchState();
</script>
</body>
</html>
