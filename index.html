<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arriva Boordcomputer – werkend</title>
    <style>
        :root {
            --bg-cream: #E8E8D8;
            --bg-light: #F0F0E0;
            --green-pale: #C8D8B8;
            --green-mid: #8FB87A;
            --green-dark: #4A7A3A;
            --red-alert: #D32F2F;
            --orange-warn: #F57C00;
            --text-dark: #2C2C2C;
            --text-muted: #666;
            --sidebar-bg: #D8D8C8;
            --sidebar-btn: #C0C0B0;
            --sidebar-btn-active: #8FB87A;
            --sidebar-btn-hover: #B0B0A0;
            --border-color: #B8B8A8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden; background: #1a1a1a;
            font-family: 'Segoe UI', 'Roboto', 'Inter', sans-serif;
        }
        .tablet-frame {
            width: 100vw; height: 100vh; max-width: 1200px; max-height: 800px;
            background: var(--bg-cream); display: flex; flex-direction: column;
            overflow: hidden; position: relative; border-radius: 8px;
        }
        .page { display: none; flex-direction: column; height: 100%; width: 100%; }
        .page.active { display: flex; }

        .top-bar {
            background: var(--bg-light); border-bottom: 2px solid var(--border-color);
            padding: 6px 16px; display: flex; align-items: center;
            justify-content: space-between; height: 40px;
        }
        .top-bar-left { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); }
        .top-bar-left span { color: var(--text-dark); font-weight: 600; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .center-area { flex: 1; display: flex; flex-direction: column; padding: 12px 16px; gap: 10px; overflow: hidden; }
        .right-sidebar {
            width: 150px; background: var(--sidebar-bg);
            border-left: 2px solid var(--border-color);
            display: flex; flex-direction: column; padding: 8px 6px; gap: 6px;
        }
        .sidebar-btn {
            width: 100%; padding: 10px 6px; border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--sidebar-btn); color: var(--text-dark);
            font-size: 11px; font-weight: 600; cursor: pointer; text-align: center;
        }
        .sidebar-btn:hover { background: var(--sidebar-btn-hover); }
        .sidebar-btn.active { background: var(--sidebar-btn-active); color: white; border-color: var(--green-dark); }

        .header-info { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
        .header-left { flex: 1; }
        .line-number { font-size: 26px; font-weight: 900; color: var(--text-dark); }
        .line-status { font-size: 13px; color: var(--text-muted); }
        .destination { font-size: 17px; font-weight: 600; color: var(--text-dark); }
        .delay-box {
            width: 85px; height: 65px; background: var(--green-dark);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px; font-weight: 900; font-family: 'Courier New', monospace;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .delay-box.red { background: var(--red-alert); }
        .delay-box.yellow { background: var(--orange-warn); }

        .stop-list {
            flex: 1; overflow-y: auto; border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--green-pale); padding: 8px;
        }
        .stop-item {
            display: flex; align-items: center; padding: 7px 12px;
            border-radius: 6px; font-size: 13px; border-left: 4px solid transparent;
            color: var(--text-dark);
        }
        .stop-item.current { background: rgba(255,255,255,0.75); border-left-color: var(--orange-warn); font-weight: 700; }
        .stop-item.past { opacity: 0.45; text-decoration: line-through; }
        .stop-name { flex: 1; }
        .stop-time { font-weight: 600; color: var(--text-muted); margin-right: 8px; }

        .bottom-bar {
            background: var(--bg-light); border-top: 2px solid var(--border-color);
            padding: 8px 16px; display: flex; align-items: center;
            justify-content: space-between; height: 52px;
        }
        .bottom-left { display: flex; gap: 8px; }
        .bottom-btn {
            padding: 8px 18px; border-radius: 6px; border: none;
            font-size: 13px; font-weight: 700; cursor: pointer; color: white;
        }
        .bottom-btn.green { background: var(--green-dark); }
        .bottom-btn.blue { background: #1976D2; }
        .bottom-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .bottom-right { display: flex; align-items: center; gap: 14px; }
        .arrival-badge {
            background: var(--green-dark); color: white;
            padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 700;
        }
        .clock-time { font-size: 20px; font-weight: 700; }
        .clock-date { font-size: 11px; color: var(--text-muted); }

        .time-selector { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
        .time-selector label { font-size: 14px; font-weight: 600; color: var(--text-dark); }
        .time-selector input[type="time"] {
            padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border-color);
            font-size: 14px; background: white; color: var(--text-dark);
        }
        .time-selector button {
            padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-color);
            background: var(--sidebar-btn); font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>
<div class="tablet-frame">
    <div class="page active" id="pageHome">
        <div class="top-bar">
            <div class="top-bar-left">
                <span id="topDate"></span><span>|</span>
                <span>Lijn <span id="topLineNum">54</span></span><span>|</span>
                <span>Bestuurder: J. de Vries</span><span>|</span>
                <span>Omloop: A</span>
            </div>
        </div>
        <div class="main-layout">
            <div class="center-area">
                <div class="header-info">
                    <div class="header-left">
                        <div class="line-number" id="lineNumber">X Geen Dienst</div>
                        <div class="line-status" id="lineStatus">In dienst</div>
                        <div class="destination" id="destination">Halte Busdepot</div>
                        <div class="time-selector">
                            <label for="startTimeInput">Geplande vertrek:</label>
                            <input type="time" id="startTimeInput" onchange="setPlannedTime()">
                            <button onclick="setNow()">Nu</button>
                        </div>
                    </div>
                    <div class="delay-box green" id="delayBox">0</div>
                </div>
                <div class="stop-list" id="stopList"></div>
            </div>
            <div class="right-sidebar">
                <button class="sidebar-btn active" onclick="switchLine('54')">🚌 Lijn 54</button>
                <button class="sidebar-btn" onclick="switchLine('18')">🚌 Lijn 18</button>
                <button class="sidebar-btn" onclick="switchLine('27')">🚌 Lijn 27</button>
                <button class="sidebar-btn" onclick="switchLine('42')">🚌 Lijn 42</button>
            </div>
        </div>
        <div class="bottom-bar">
            <div class="bottom-left">
                <button class="bottom-btn green" id="btnVertrek" onclick="depart()">🚌 Vertrek</button>
                <button class="bottom-btn blue" id="btnVolgende" onclick="nextStop()" disabled>⏭ Volgende</button>
                <button class="bottom-btn blue" id="btnTerug" onclick="prevStop()" disabled>⏮ Terug</button>
            </div>
            <div class="bottom-right">
                <div class="arrival-badge" id="arrivalBadge">Vertrek: --:--</div>
                <div>
                    <div class="clock-time" id="clockTime">00:00:00</div>
                    <div class="clock-date" id="clockDate">5 juli 2026</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const busLines = {
        '54': { number:'54', destination:'Halte Busdepot',
            stops: [
                {name:'Medisch Centrum', offset:0, type:'start'},
                {name:'Tijdelijke Halte Rotonde BD', offset:2},{name:'Halte Museumplein', offset:4},{name:'Halte Malherplein', offset:6},
                {name:'Bus Station', offset:8},{name:'Halte Europaweg', offset:10},{name:'Halte Busdepot (eindpunt)', offset:12, type:'end'}
            ]},
        '18': { number:'18', destination:'Leeuwarden Airport',
            stops: [
                {name:'Centraal Station', offset:0, type:'start'},
                {name:'Halte Busdepot', offset:2},{name:'Leeuwarden Airport', offset:4},{name:'Bus Station', offset:6},
                {name:'Halte Museumplein', offset:8},{name:'Halte Malherplein', offset:10},{name:'Halte Van Houtenlaan', offset:12},
                {name:'Halte School', offset:14},{name:'Halte Busdepot', offset:16},{name:'Leeuwarden Airport (eindpunt)', offset:18, type:'end'}
            ]},
        '27': { number:'27', destination:'Halte Busdepot',
            stops: [
                {name:'Halte Wijk Station', offset:0, type:'start'},
                {name:'Halte Europaweg', offset:2},{name:'Bus Station', offset:7},{name:'Medisch Centrum', offset:9},
                {name:'Halte Malherplein', offset:11},{name:'Halte Museumplein', offset:13},{name:'Halte Veldstraat', offset:15},
                {name:'Halte School', offset:17},{name:'Halte Busdepot (eindpunt)', offset:19, type:'end'}
            ]},
        '42': { number:'42', destination:'Halte Busdepot',
            stops: [
                {name:'Halte Veldstraat', offset:0, type:'start'},
                {name:'Halte Van Houtenlaan', offset:2},{name:'Medisch Centrum', offset:4},{name:'Tijdelijke Halte Rotonde BD', offset:6},
                {name:'Bus Station', offset:8},{name:'Centraal Station', offset:10},{name:'Halte Europaweg', offset:12},
                {name:'Tijdelijke Halte Rotonde BD', offset:14},{name:'Medisch Centrum', offset:16},{name:'Halte Van Houtenlaan', offset:18},
                {name:'Halte School', offset:20},{name:'Halte Busdepot', offset:22},{name:'Halte Busdepot (eindpunt)', offset:24, type:'end'}
            ]}
    };

    let currentLine = '54';
    let currentStops = busLines['54'].stops;
    let plannedStart = null;    // Date object
    let actualStart = null;     // Date object
    let currentStopIndex = -1;

    function formatTime(d) { return d ? `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` : '--:--'; }

    // ---- Klok ----
    function updateClock() {
        const n = new Date();
        document.getElementById('clockTime').textContent = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
        const m = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
        document.getElementById('clockDate').textContent = `${n.getDate()} ${m[n.getMonth()]} ${n.getFullYear()}`;
        document.getElementById('topDate').textContent = document.getElementById('clockDate').textContent;
    }

    // ---- Geplande tijd ----
    window.setPlannedTime = function() {
        const v = document.getElementById('startTimeInput').value;
        if (!v) return;
        const [h,m] = v.split(':');
        const now = new Date();
        plannedStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), parseInt(h), parseInt(m), 0);
        if (!actualStart) renderStops();
        updateArrivalBadge();
    };
    window.setNow = function() {
        const n = new Date();
        document.getElementById('startTimeInput').value = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
        setPlannedTime();
    };

    // ---- Lijn wisselen ----
    window.switchLine = function(lineKey) {
        if (!busLines[lineKey]) return;
        currentLine = lineKey;
        currentStops = busLines[lineKey].stops;
        currentStopIndex = -1;
        actualStart = null;
        plannedStart = null;
        document.getElementById('lineNumber').textContent = busLines[lineKey].number + ' Geen Dienst';
        document.getElementById('destination').textContent = busLines[lineKey].destination;
        document.getElementById('topLineNum').textContent = busLines[lineKey].number;
        document.getElementById('lineStatus').textContent = 'In dienst';
        document.getElementById('btnVertrek').disabled = false;
        document.getElementById('btnVolgende').disabled = true;
        document.getElementById('btnTerug').disabled = true;
        setNow();
        updateAll();
        document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
        const btns = document.querySelectorAll(`.sidebar-btn[onclick*="switchLine('${lineKey}')"]`);
        if (btns.length) btns[0].classList.add('active');
    };

    // ---- Reis besturing ----
    window.depart = function() {
        if (!plannedStart) setNow();
        actualStart = new Date();
        currentStopIndex = 0;
        document.getElementById('lineStatus').textContent = 'In dienst - Actief';
        document.getElementById('btnVertrek').disabled = true;
        document.getElementById('btnVolgende').disabled = false;
        document.getElementById('btnTerug').disabled = true;
        updateAll();
    };
    window.nextStop = function() {
        if (currentStopIndex < 0 || currentStopIndex >= currentStops.length-1) return;
        currentStopIndex++;
        if (currentStopIndex === currentStops.length-1) {
            document.getElementById('btnVolgende').disabled = true;
            document.getElementById('lineStatus').textContent = 'Eindbestemming bereikt';
        }
        document.getElementById('btnTerug').disabled = false;
        updateAll();
    };
    window.prevStop = function() {
        if (currentStopIndex <= 0) return;
        currentStopIndex--;
        document.getElementById('btnVolgende').disabled = false;
        if (currentStopIndex === 0) document.getElementById('btnTerug').disabled = true;
        updateAll();
    };

    function updateAll() {
        updateDelayBox();
        updateArrivalBadge();
        renderStops();
    }

    function updateDelayBox() {
        const box = document.getElementById('delayBox');
        const ref = actualStart || plannedStart;
        if (!ref || currentStopIndex < 0 || currentStopIndex >= currentStops.length-1) {
            box.textContent = '0';
            box.className = 'delay-box green';
            return;
        }
        const now = new Date();
        const nextTime = new Date(ref.getTime() + currentStops[currentStopIndex+1].offset*60000);
        const diffSec = Math.round((now - nextTime)/1000);
        function fmt(sec) {
            if (sec <= -60) {
                let abs = Math.abs(sec), mins = Math.floor(abs/60), half = (abs%60)>=30?0.5:0;
                let val = mins+half;
                return {text:'-'+(val%1===0?val:Math.floor(val)+'½'), color:'red'};
            } else if (sec <= -30) return {text:'-½', color:'yellow'};
            else if (sec < 60) return {text:'0', color:'green'};
            else {
                let mins = Math.floor(sec/60), half = (sec%60)>=30?0.5:0;
                let val = mins+half;
                return {text:'+'+(val%1===0?val:Math.floor(val)+'½'), color:'red'};
            }
        }
        const {text,color} = fmt(diffSec);
        box.textContent = text;
        box.className = `delay-box ${color}`;
    }

    function updateArrivalBadge() {
        const badge = document.getElementById('arrivalBadge');
        const ref = actualStart || plannedStart;
        if (!ref) { badge.textContent = 'Vertrek: --:--'; return; }
        if (currentStopIndex === -1 && plannedStart && !actualStart) {
            badge.textContent = `Vertrek: ${formatTime(plannedStart)}`;
        } else if (currentStopIndex >= 0 && currentStopIndex < currentStops.length-1) {
            const next = new Date(ref.getTime() + currentStops[currentStopIndex+1].offset*60000);
            badge.textContent = `Aankomst: ${formatTime(next)}`;
        } else if (currentStopIndex >= currentStops.length-1) {
            badge.textContent = 'Eindbestemming';
        } else {
            badge.textContent = 'Vertrek: --:--';
        }
    }

    function renderStops() {
        const list = document.getElementById('stopList');
        list.innerHTML = '';
        const ref = actualStart || plannedStart || null;
        currentStops.forEach((s,i) => {
            const d = document.createElement('div');
            d.className = 'stop-item';
            if (i === currentStopIndex) d.classList.add('current');
            if (i < currentStopIndex) d.classList.add('past');
            if (s.type === 'start') d.classList.add('start');
            if (s.type === 'end') d.classList.add('end');
            const t = ref ? new Date(ref.getTime() + s.offset*60000) : null;
            d.innerHTML = `<span class="stop-name">${s.name}</span><span class="stop-time">${t ? formatTime(t) : '--:--'}</span>`;
            list.appendChild(d);
        });
        if (currentStopIndex >= 0) {
            const items = list.querySelectorAll('.stop-item');
            if (items[currentStopIndex]) items[currentStopIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    // Start
    setInterval(() => { updateClock(); updateDelayBox(); updateArrivalBadge(); }, 1000);
    updateClock();
    setNow();
    renderStops();
    document.querySelector('.sidebar-btn[onclick*="switchLine(\'54\')"]').classList.add('active');
</script>
</body>
</html>
